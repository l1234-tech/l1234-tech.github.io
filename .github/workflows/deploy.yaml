name: Deploy MkDocs Site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Даем необходимые permissions
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Устанавливаем зависимости
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Проверяем наличие mkdocs.yml
      - name: Check mkdocs.yml exists
        run: |
          if [ ! -f "./src/mkdocs.yml" ]; then
            echo "Error: mkdocs.yml not found in ./src/"
            exit 1
          fi
          echo "mkdocs.yml found successfully"

      # 5. Собираем сайт
      - name: Build MkDocs site
        run: |
          cd ./src
          mkdocs build --clean -d ../docs

      # 6. Проверяем результат сборки
      - name: Verify built site
        run: |
          echo "Checking built site structure:"
          ls -la ./docs/
          if [ -f "./docs/index.html" ]; then
            echo "Site built successfully!"
          else
            echo "Error: index.html not found!"
            exit 1
          fi

      # 7. Загружаем артефакт для GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      # 8. Деплоим на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4