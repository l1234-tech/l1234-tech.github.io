name: Deploy MkDocs Site

on:
  push:
    branches:
      - main  # Запускать при пуше в ветку main
  pull_request:
    branches:
      - main  # Запускать тесты при PR (но не публиковать)

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Python (версию можно поменять на 3.10, 3.11 и т.д.)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      # 3. Устанавливаем зависимости
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Собираем сайт (аналог вашего шага build-mkdocs-docs)
      # Важно: убедитесь, что в mkdocs.yml правильно указан путь к документам, если они в src
      - name: Build MkDocs site
        run: |
          # Если ваши .md файлы лежат в папке src, проверьте настройку docs_dir в mkdocs.yml
          # Команда ниже просто запускает сборку в папку docs (как указано в mkdocs.yml по умолчанию)
          mkdocs build --clean

      # 5. Публикуем на GitHub Pages (аналог вашего шага publish-to-release-branch)
      # Это действие само создает ветку gh-pages и пушит туда файлы
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' # Публиковать только если это ветка main (не PR)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs  # Папка, куда собрался сайт
          force_orphan: true   # Делает историю ветки gh-pages чистой (как git push -f)