name: Deploy MkDocs Site

on:
  push:
    branches:
      - main  # Запускать при пуше в ветку main
  pull_request:
    branches:
      - main  # Запускать тесты при PR (но не публиковать)

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Python (версию можно поменять на 3.10, 3.11 и т.д.)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Устанавливаем зависимости
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Проверяем наличие mkdocs.yml
      - name: Check mkdocs.yml exists
        run: |
          if [ ! -f "./src/mkdocs.yml" ]; then
            echo "Error: mkdocs.yml not found in ./src/"
            exit 1
          fi
          echo "mkdocs.yml found successfully"

      # 5. Собираем сайт (исправленная команда)
      - name: Build MkDocs site
        run: |
          # Переходим в папку src и собираем оттуда
          cd ./src
          mkdocs build --clean -d ../docs

      # 6. Проверяем результат сборки
      - name: Verify built site
        run: |
          echo "Checking built site structure:"
          ls -la ./docs/
          echo "Checking if index.html exists:"
          if [ -f "./docs/index.html" ]; then
            echo "✅ Site built successfully!"
          else
            echo "❌ Error: index.html not found!"
            exit 1
          fi

      # 7. Публикуем на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' # Публиковать только если это ветка main (не PR)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs  # Папка, куда собрался сайт
          force_orphan: true   # Делает историю ветки gh-pages чистой (как git push -f)