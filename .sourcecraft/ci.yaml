on:
  push:
    workflows: [full-pipeline]
    filter:
      branches: [main]    # ← триггер только main, чтобы пуш в release не перезапускал CI

workflows:
  full-pipeline:
    tasks:
      # === ЗАДАЧА 1: ВЫПОЛНИТЬ НОУТБУК И СОЗДАТЬ ОТЧЁТ ===
      - name: execute-notebook-and-report
        cubes:
          - name: execute-and-generate-report
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - pip install jupyter nbconvert pandas matplotlib nbformat
              - echo "=== Выполняю ноутбук ==="
              - jupyter nbconvert --to notebook --execute --inplace 2_semestr/lr_9/лаба_9.ipynb
              - echo "=== Добавляю маркер CI ==="
              - |
                python -c "
                import nbformat as nbf
                from datetime import datetime, timezone
                with open('2_semestr/lr_9/лаба_9.ipynb', 'r') as f:
                    nb = nbf.read(f, as_version=4)
                marker_text = f'''# Выполнено в SourceCraft CI
                - Время: {datetime.now(timezone.utc).isoformat()}
                - Ноутбук успешно выполнен в облачной среде
                - Все ячейки проверены на ошибки'''
                new_cell = nbf.v4.new_markdown_cell(marker_text)
                nb.cells.append(new_cell)
                with open('2_semestr/lr_9/лаба_9.ipynb', 'w') as f:
                    nbf.write(nb, f)
                "
              - echo "=== Генерирую отчёт Markdown в src/docs/labs/laba9.md ==="
              - mkdir -p src/docs/labs
              - jupyter nbconvert --to markdown 2_semestr/lr_9/лаба_9.ipynb --output-dir src/docs/labs --output laba9.md
              - echo "Отчёт создан"

      # === ЗАДАЧА 2: СОБРАТЬ САЙТ ИЗ ГОТОВОГО ОТЧЁТА ===
      - name: build-and-publish-site
        cubes:
          - name: build-mkdocs-docs
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - pip install mkdocs mkdocs-jupyter
              - cd ./src && mkdocs build -d ../docs
              - echo "Сайт собран в папке ./docs"
          
          - name: publish-to-release-branch
            script:
              - |
                git config user.name "sourcecraft-ci[bot]"
                git config user.email "ci@sourcecraft.dev"
                git fetch origin release || true
                git checkout -B release origin/release || git checkout -b release
                git add ./docs
                git commit -m "feat: автоматическое обновление сайта" || echo "No changes"
                git push origin release -f