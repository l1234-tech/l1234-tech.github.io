on:
  push:
    - workflows: [notebook-processing-workflow, site-build-workflow]
      filter:
        branches: ["main"]

workflows:
  notebook-processing-workflow:
    tasks:
      - name: process-notebook-task
        cubes:
          - name: process-notebook-with-deps
            image: python:3.11-alpine
            script:
              - |
                echo "=== Notebook Processing Workflow ==="
                echo "Installing Python dependencies..."
                pip install nbformat pandas matplotlib
                echo "Dependencies installed successfully"
                
                echo "Checking repository structure..."
                echo "Current directory: $(pwd)"
                echo "Directory contents:"
                ls -la
                echo "2_semestr contents:"
                ls -la 2_semestr/
                echo "2_semestr/lr_9 contents:"
                ls -la 2_semestr/lr_9/
                
                echo "Checking if notebook file exists..."
                if [ -f "2_semestr/lr_9/лаба_9.ipynb" ]; then
                  echo "Notebook found at: 2_semestr/lr_9/лаба_9.ipynb"
                  
                  # Create Python script file to avoid indentation issues
                  cat > /tmp/process_notebook.py << 'EOF'
import nbformat as nbf
import os
import socket
from datetime import datetime

# Load the notebook
with open('2_semestr/lr_9/лаба_9.ipynb', 'r') as f:
    nb = nbf.read(f, as_version=4)

# Get CI environment information
run_id = os.environ.get('SOURCECRAFT_RUN_ID', 'N/A')
commit_sha = os.environ.get('SOURCECRAFT_COMMIT_SHA', 'N/A')
commit_sha_short = commit_sha[:8] if commit_sha != 'N/A' else 'N/A'
hostname = socket.gethostname()
timestamp = datetime.utcnow().isoformat()

# Create detailed marker text
marker_text = f'''# Выполнено в SourceCraft CI/CD

## Информация о выполнении:
- **Платформа:** SourceCraft CI/CD Runner
- **Идентификатор запуска:** {run_id}
- **Коммит:** {commit_sha_short}
- **Хост раннера:** {hostname}
- **Время выполнения:** {timestamp} UTC


## Технические детали:
- Использован Docker образ: python:3.11-alpine
- Процессор: CI/CD Runner Environment
- Память: Выделенная CI/CD инфраструктура
- Сеть: SourceCraft Internal Network

*Этот маркер был автоматически добавлен системой непрерывной интеграции SourceCraft.*
'''

                  # Add as a new markdown cell at the beginning
                  new_cell = nbf.v4.new_markdown_cell(marker_text)
                  nb.cells.insert(0, new_cell)
                  
                  # Save the notebook
                  with open('2_semestr/lr_9/лаба_9.ipynb', 'w') as f:
                    nbf.write(nb, f)
                  
                  print('Notebook успешно обработан и помечен маркером выполнения SourceCraft CI/CD')
                  echo "Creating processed notebook artifact..."
                  
                else
                  echo "ERROR: Notebook file not found at: 2_semestr/lr_9/лаба_9.ipynb"
                  echo "Looking for notebook files..."
                  find . -name "*.ipynb" -type f 2>/dev/null | head -20
                  exit 1
                fi

          - name: save-notebook-artifact
            script:
              - |
                echo "=== Saving Notebook Artifact ==="
                if [ -f "2_semestr/lr_9/лаба_9.ipynb" ]; then
                  echo "Creating artifacts directory..."
                  mkdir -p artifacts/notebook
                  
                  echo "Copying processed notebook..."
                  cp "2_semestr/lr_9/лаба_9.ipynb" "artifacts/notebook/лаба_9_processed.ipynb"
                  
                  echo "Creating artifact info file..."
                  cat > artifacts/notebook/artifact_info.txt << EOF
Artifact: Processed Notebook
Source: 2_semestr/lr_9/лаба_9.ipynb
Destination: artifacts/notebook/лаба_9_processed.ipynb
Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
Workflow: notebook-processing-workflow
Run ID: ${SOURCECRAFT_RUN_ID:-N/A}
Commit SHA: ${SOURCECRAFT_COMMIT_SHA:-N/A}
EOF
                  
                  echo "Artifact contents:"
                  ls -la artifacts/notebook/
                  echo "Artifact saved successfully!"
                else
                  echo "ERROR: Processed notebook not found!"
                  exit 1
                fi

            artifacts:
              paths:
                - artifacts/notebook/

  site-build-workflow:
    tasks:
      - name: build-site-task
        cubes:
          - name: install-deps-and-build
            image: python:3.11-alpine
            script:
              - |
                echo "=== Site Build Workflow ==="
                echo "Checking repository structure..."
                echo "Current directory: $(pwd)"
                echo "Directory contents:"
                ls -la
                
                echo "Installing MkDocs and dependencies..."
                pip install mkdocs mkdocs-material
                if [ -f requirements.txt ]; then 
                  echo "Installing requirements from requirements.txt..."
                  pip install -r requirements.txt
                fi
                
                echo "Building MkDocs site..."
                if [ -d "./src" ]; then
                  echo "src directory found, checking contents..."
                  ls -la ./src/
                  cd ./src
                  
                  echo "Building site with MkDocs..."
                  mkdocs build -d ../site-build
                  
                  echo "Site built successfully!"
                  echo "Build directory contents:"
                  ls -la ../site-build/
                  echo "Total files in build:"
                  find ../site-build -type f | wc -l
                else
                  echo "ERROR: src directory not found!"
                  echo "Looking for mkdocs.yml files..."
                  find . -name "mkdocs.yml" -type f 2>/dev/null
                  exit 1
                fi

          - name: save-site-artifact
            script:
              - |
                echo "=== Saving Site Artifact ==="
                if [ -d "site-build" ]; then
                  echo "Creating artifacts directory for site..."
                  mkdir -p artifacts/site
                  
                  echo "Copying built site..."
                  cp -r site-build/* artifacts/site/
                  
                  echo "Creating artifact info file..."
                  cat > artifacts/site/artifact_info.txt << EOF
Artifact: Static Site Build
Source: site-build/
Destination: artifacts/site/
Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
Workflow: site-build-workflow
Run ID: ${SOURCECRAFT_RUN_ID:-N/A}
Commit SHA: ${SOURCECRAFT_COMMIT_SHA:-N/A}
Site Name: Портфолио Сырчина Андрея
Build Tool: MkDocs Material
EOF
                  
                  echo "Creating site preview..."
                  cat > artifacts/site/index_preview.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>Site Build Preview</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .info { background: #f5f5f5; padding: 20px; border-radius: 5px; }
        .files { margin-top: 20px; }
        .file { padding: 5px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Static Site Build Artifact</h1>
    <div class="info">
        <h2>Build Information</h2>
        <p><strong>Workflow:</strong> site-build-workflow</p>
        <p><strong>Generated:</strong> $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>
        <p><strong>Run ID:</strong> ${SOURCECRAFT_RUN_ID:-N/A}</p>
        <p><strong>Commit:</strong> ${SOURCECRAFT_COMMIT_SHA:-N/A}</p>
    </div>
    <div class="files">
        <h2>Built Files (first 20):</h2>
        $(find site-build -type f | head -20 | sed 's|^|<div class="file">• &</div>|')
    </div>
</body>
</html>
EOF
                  
                  echo "Artifact contents:"
                  ls -la artifacts/site/
                  echo "Total files in artifact:"
                  find artifacts/site -type f | wc -l
                  echo "Site artifact saved successfully!"
                else
                  echo "ERROR: Site build directory not found!"
                  exit 1
                fi

            artifacts:
              paths:
                - artifacts/site/