name: Execute Notebook and Build Docs

on:
  push:
    branches:
      - main

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install nbformat pandas matplotlib

      - name: Execute notebook and add CI marker
        run: |
          python -c "
          import nbformat as nbf
          import os
          from datetime import datetime

          # Load the notebook
          with open('2_semestr/lr_9/data/лаба_9.ipynb', 'r') as f:
              nb = nbf.read(f, as_version=4)

          # Create marker text with CI identifiers
          marker_text = f'''# Executed in GitHub Actions CI
          - Run ID: {os.getenv('GITHUB_RUN_ID')}
          - Commit SHA: {os.getenv('GITHUB_SHA')}
          - Runner: {os.getenv('RUNNER_NAME')}
          - Timestamp: {datetime.utcnow().isoformat()} UTC
          - Not executed locally or in Google Colab.'''

          # Add as a new markdown cell at the end
          new_cell = nbf.v4.new_markdown_cell(marker_text)
          nb.cells.append(new_cell)

          # Save the notebook
          with open('2_semestr/lr_9/data/лаба_9.ipynb', 'w') as f:
              nbf.write(nb, f)
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: executed-notebook
          path: 2_semestr/lr_9/data/лаба_9.ipynb

  build-and-publish-docs:
    runs-on: ubuntu-latest
    needs: execute-notebook  # ждать завершения первого job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install mkdocs

      - name: Build MkDocs site
        run: |
          cd ./src
          mkdocs build -d ../docs
          echo "Сайт собран в папке ./docs"
          ls -la ../docs

      - name: Publish to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add ./docs
          git commit -m "feat: автоматическое обновление сайта" || echo "No changes to commit"
          git push origin release -f