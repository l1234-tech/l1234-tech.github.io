on:
  push:
    workflows: [execute-notebook, build-site]
    filter:
      branches: [main, release]

workflows:
  execute-notebook:
    tasks:
      - name: run-notebook
        cubes:
          - name: execute-and-mark
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - pip install jupyter nbconvert pandas matplotlib nbformat
              - echo "=== Выполняю ноутбук ==="
              - jupyter nbconvert --to notebook --execute --inplace 2_semestr/lr_9/лаба_9.ipynb
              - echo "=== Добавляю маркер CI ==="
              - |
                python -c "
                import nbformat as nbf
                from datetime import datetime, timezone

                with open('2_semestr/lr_9/лаба_9.ipynb', 'r') as f:
                    nb = nbf.read(f, as_version=4)

                marker_text = f'''# Выполнено в SourceCraft CI
                - Время: {datetime.now(timezone.utc).isoformat()}
                - Ноутбук успешно выполнен в облачной среде
                - Все ячейки проверены на ошибки'''

                new_cell = nbf.v4.new_markdown_cell(marker_text)
                nb.cells.append(new_cell)

                with open('2_semestr/lr_9/лаба_9.ipynb', 'w') as f:
                    nbf.write(nb, f)
                "
              - echo "=== Сохраняю артефакт ==="
              - mkdir -p /artifacts
              - cp 2_semestr/lr_9/лаба_9.ipynb /artifacts/
              - echo "Ноутбук сохранён как артефакт"
          
          # SourceCraft автоматически сохранит /artifacts как артефакт workflow

  build-site:
    tasks:
      - name: build-and-publish-docs
        cubes:
          - name: get-notebook-artifact
            script:
              - echo "=== Скачиваю артефакт из execute-notebook ==="
              # В SourceCraft артефакты доступны через переменные окружения
              - mkdir -p ./src/docs/notebooks
              - cp $SOURCE_CRAFT_ARTIFACTS_DIR/лаба_9.ipynb ./src/docs/notebooks/ 2>/dev/null || echo "Артефакт не найден, использую локальную версию"
              - ls -la ./src/docs/notebooks/
          
          - name: build-mkdocs-docs
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - pip install mkdocs mkdocs-jupyter
              - cd ./src && mkdocs build -d ../docs
              - echo "Сайт собран в папке ./docs"
              - ls -la ./docs
          
          - name: publish-to-release-branch
            script:
              - |
                git config user.name "sourcecraft-ci[bot]"
                git config user.email "ci@sourcecraft.dev"
                git fetch origin release || true
                git checkout -B release origin/release || git checkout -b release
                git add ./docs
                git commit -m "feat: автоматическое обновление сайта" || echo "No changes to commit"
                git push origin release -f