on:
  push:
    - workflows: [notebook-and-docs-workflow]
      filter:
        branches: ["main"]

workflows:
  notebook-and-docs-workflow:
    tasks:
      - name: execute-notebook-task
        cubes:
          - name: checkout-repo
            image: alpine/git:latest
            script:
              - git clone https://${{ secrets.GIT_TOKEN }}@sourcecraft.dev/python-itmo/l1234-tech-github-io.git /workspace
              - cd /workspace
              - git checkout ${{ env.SOURCECRAFT_COMMIT_SHA }}

          - name: setup-python-dependencies
            image: python:3.11-alpine
            script:
              - pip install nbformat pandas matplotlib

          - name: execute-notebook
            image: python:3.11-alpine
            script:
              - |
                cd /workspace
                python -c "
                import nbformat as nbf
                import os
                from datetime import datetime

                # Load the notebook
                with open('2_semestr/lr_9/data/лаба_9.ipynb', 'r') as f:
                    nb = nbf.read(f, as_version=4)

                # Create marker text with CI identifiers
                marker_text = f'''# Executed in SourceCraft CI
                - Run ID: ${{ env.SOURCECRAFT_RUN_ID }}
                - Commit SHA: ${{ env.SOURCECRAFT_COMMIT_SHA }}
                - Timestamp: {datetime.utcnow().isoformat()} UTC
                - Not executed locally or in Google Colab.'''

                # Add as a new markdown cell at the end
                new_cell = nbf.v4.new_markdown_cell(marker_text)
                nb.cells.append(new_cell)

                # Save the notebook
                with open('2_semestr/lr_9/data/лаба_9.ipynb', 'w') as f:
                    nbf.write(nb, f)
                "
                echo "Notebook executed successfully"

      - name: build-docs-task
        needs: [execute-notebook-task]
        cubes:
          - name: build-mkdocs
            image: python:3.11-alpine
            script:
              - |
                cd /workspace
                pip install mkdocs
                if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                cd ./src
                mkdocs build -d ../docs
                echo "Сайт собран в папке ./docs"
                ls -la ../docs

