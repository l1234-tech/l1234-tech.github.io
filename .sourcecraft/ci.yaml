on:
  push:
    workflows: build-docs
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-docs
        cubes:
          - name: build-mkdocs-docs
            image: docker.io/library/python:3.14-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - cd ./src && mkdocs  build -d ../docs
              - echo "Сайт собран в папке ./docs"
              - ls -la ./docs
          
          - name: publish-to-release-branch
            script:
              - git checkout -b release
              - git add ./docs
              - "git commit -m \"feat: автоматическое обновление сайта\""
              - "git push origin release -f"