on:
  push:
    workflows: [full-pipeline]
    filter:
      branches: [main]

workflows:
  full-pipeline:
    tasks:
      - name: execute-notebook
        cubes:
          - name: execute-and-mark
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - pip install jupyter nbconvert pandas matplotlib nbformat
              - echo "=== Выполняю ноутбук ==="
              - jupyter nbconvert --to notebook --execute --inplace 2_semestr/lr_9/лаба_9.ipynb
              - echo "=== Добавляю CI-маркер ==="
              - |
                python -c "
                import nbformat as nbf
                import os
                from datetime import datetime, timezone

                with open('2_semestr/lr_9/лаба_9.ipynb', 'r') as f:
                    nb = nbf.read(f, as_version=4)

                run_id = os.getenv('SOURCE_CRAFT_RUN_ID', 'недоступен')
                runner_name = os.getenv('SOURCE_CRAFT_RUNNER', 'SourceCraft Runner')
                commit_sha = os.getenv('SOURCE_CRAFT_COMMIT_SHA', 'недоступен')
                workflow_name = os.getenv('SOURCE_CRAFT_WORKFLOW', 'full-pipeline')
                
                marker_text = f'''# ✅ Выполнено в SourceCraft CI
                
                **Этот ноутбук выполнен автоматически в CI-раннере, а не локально и не в Google Colaboratory.**
                
                ## Идентификаторы выполнения:
                - **Workflow:** {workflow_name}
                - **Run ID:** {run_id}
                - **Runner:** {runner_name}
                - **Commit SHA:** {commit_sha}
                - **Время выполнения:** {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}
                - **Среда:** SourceCraft CI (облачный раннер)
                
                ---
                *Этот маркер добавлен автоматически. Если вы видите его в Google Colab или локально — ноутбук был до этого выполнен в CI.*
                '''

                new_cell = nbf.v4.new_markdown_cell(marker_text)
                nb.cells.append(new_cell)

                with open('2_semestr/lr_9/лаба_9.ipynb', 'w') as f:
                    nbf.write(nb, f)
                "
              - echo "=== CI-маркер добавлен ==="
          
          - name: save-artifact
            script:
              - |
                git config user.name "sourcecraft-ci[bot]"
                git config user.email "ci@sourcecraft.dev"
                git fetch origin artifacts || true
                git checkout -B artifacts origin/artifacts || git checkout --orphan artifacts
                rm -rf executed_notebooks/лаба_9*
                mkdir -p executed_notebooks
                cp 2_semestr/lr_9/лаба_9.ipynb executed_notebooks/лаба_9.ipynb
                git add executed_notebooks/
                git commit -m "✅ Выполненный ноутбук — лаба_9" || echo "No changes"
                git push origin artifacts -f
                echo "=== Артефакт обновлён ==="

      - name: build-and-publish-site
        cubes:
          - name: copy-notebook-to-docs
            script:
              - mkdir -p ./src/docs/notebooks
              - cp 2_semestr/lr_9/лаба_9.ipynb ./src/docs/notebooks/
              - echo "Ноутбук скопирован в документацию"
          
          - name: build-mkdocs-docs
            image: docker.io/library/python:3.13-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - pip install mkdocs mkdocs-jupyter
              - cd ./src && mkdocs build -d ../docs
              - echo "Сайт собран в папке ./docs"
          
          - name: publish-to-release-branch
            script:
              - |
                git config user.name "sourcecraft-ci[bot]"
                git config user.email "ci@sourcecraft.dev"
                git fetch origin release || true
                git checkout -B release origin/release || git checkout -b release
                git add ./docs
                git commit -m "feat: автоматическое обновление сайта" || echo "No changes"
                git push origin release -f