on:
  push:
    - workflows: [notebook-and-docs-workflow]
      filter:
        branches: ["main"]

workflows:
  notebook-and-docs-workflow:
    tasks:
      - name: execute-notebook-task
        cubes:
          - name: execute-notebook-with-deps
            image: python:3.11-alpine
            script:
              - |
                echo "Installing Python dependencies..."
                pip install nbformat pandas matplotlib
                echo "Dependencies installed successfully"
                
                echo "Checking repository structure..."
                echo "Current directory: $(pwd)"
                echo "Directory contents:"
                ls -la
                echo "2_semestr contents:"
                ls -la 2_semestr/
                echo "2_semestr/lr_9 contents:"
                ls -la 2_semestr/lr_9/
                
                echo "Checking if notebook file exists..."
                if [ -f "2_semestr/lr_9/лаба_9.ipynb" ]; then
                  echo "Notebook found at: 2_semestr/lr_9/лаба_9.ipynb"
                  
                  python -c "
                  import nbformat as nbf
                  import os
                  from datetime import datetime

                  # Load the notebook
                  with open('2_semestr/lr_9/лаба_9.ipynb', 'r') as f:
                      nb = nbf.read(f, as_version=4)

                  # Create marker text with CI identifiers
                  marker_text = f'''# Executed in SourceCraft CI
                  - Run ID: {os.environ.get('SOURCECRAFT_RUN_ID', 'N/A')}
                  - Commit SHA: {os.environ.get('SOURCECRAFT_COMMIT_SHA', 'N/A')}
                  - Timestamp: {datetime.utcnow().isoformat()} UTC
                  - Not executed locally or in Google Colab.'''

                  # Add as a new markdown cell at the end
                  new_cell = nbf.v4.new_markdown_cell(marker_text)
                  nb.cells.append(new_cell)

                  # Save the notebook
                  with open('2_semestr/lr_9/лаба_9.ipynb', 'w') as f:
                      nbf.write(nb, f)
                  
                  print('Notebook executed and marked successfully')
                  "
                else
                  echo "ERROR: Notebook file not found at: 2_semestr/lr_9/лаба_9.ipynb"
                  echo "Looking for notebook files..."
                  find . -name "*.ipynb" -type f 2>/dev/null | head -20
                  exit 1
                fi

      - name: build-docs-task
        needs: [execute-notebook-task]
        cubes:
          - name: build-mkdocs
            image: python:3.11-alpine
            script:
              - |
                echo "Checking repository structure..."
                echo "Current directory: $(pwd)"
                echo "Directory contents:"
                ls -la
                
                echo "Installing MkDocs..."
                pip install mkdocs
                if [ -f requirements.txt ]; then 
                  echo "Installing requirements from requirements.txt..."
                  pip install -r requirements.txt
                fi
                
                echo "Building MkDocs site..."
                if [ -d "./src" ]; then
                  echo "src directory found, checking contents..."
                  ls -la ./src/
                  cd ./src
                  mkdocs build -d ../docs
                  echo "Сайт собран в папке ./docs"
                  echo "Docs directory contents:"
                  ls -la ../docs/
                else
                  echo "ERROR: src directory not found!"
                  echo "Looking for mkdocs.yml files..."
                  find . -name "mkdocs.yml" -type f 2>/dev/null
                  exit 1
                fi